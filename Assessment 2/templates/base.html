<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Species Call Tracker{% endblock %}</title>
    
    {% load static %}
    <!-- 1. Bootstrap 5 CSS: This makes the Timeline Cards and Badges work -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- 2. Your Custom CSS: This handles the scientific audio player and custom colors -->
    <link rel="stylesheet" href="{% static 'blog_app/styles.css' %}">
</head>
<body>
    <header>
        <!-- Navbar using a mix of Bootstrap for layout and your custom .navbar for color -->
        <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
            <div class="container">
                <a href="{% url 'blog_app:recording-list' %}" class="logo text-decoration-none">🌿 SpeciesTracker</a>
                
                <div class="nav-links">
                    <a href="{% url 'blog_app:recording-list' %}" class="navbar-link">Activity Timeline</a>
                    <a href="{% url 'blog_app:recording-create' %}" class="navbar-link">Log a Call</a>
                    <a href="{% url 'blog_app:species-analytics' %}" class="navbar-link text-warning">Analytics</a>
                </div>
            </div>
        </nav>
    </header>

    <!-- The container class centers your content professionally -->
    <main class="container my-5 main-content">
        <!-- This is where your timeline and upload forms will appear -->
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer bg-dark text-white py-5 mt-5">
        <div class="container text-center">
            <p class="mb-1">&copy; 2026 Bioacoustic Research Project. All rights reserved.</p>
            <p><small class="text-secondary">Citizen Science Species Call Monitoring System</small></p>
        </div>
    </footer>

    <!-- Bootstrap JS (Needed for mobile menus and dropdowns) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
